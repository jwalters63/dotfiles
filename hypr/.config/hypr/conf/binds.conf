# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# ==============================================================================
# TECLA MODIFICADORA PRINCIPAL
# ==============================================================================
$mainMod = SUPER

# ==============================================================================
# APLICACIONES PRINCIPALES
# ==============================================================================
bind = $mainMod, RETURN, exec, kitty                                  # Abrir terminal (Kitty)
bind = $mainMod, SPACE, exec, rofi -show drun -show-icons             # Abrir lanzador de aplicaciones (Rofi)
bind = $mainMod, B, exec, firefox                                     # Abrir navegador web
bind = $mainMod SHIFT, F, exec, sh -c 'hyprctl clients | grep -q "popup-fetch" && hyprctl dispatch closewindow class:popup-fetch || kitty --class popup-fetch -o confirm_os_window_close=0 -o background_opacity=0.6 bash -c "tput civis; clear; fastfetch; read -n 1 -s; clear"' # Alternar panel de diagnóstico flotante

# ==============================================================================
# SISTEMA Y SESIÓN
# ==============================================================================
bind = $mainMod, Q, killactive                                        # Cerrar la ventana activa
bind = $mainMod, M, exit                                              # Salir de Hyprland (Cerrar sesión)
bind = $mainMod SHIFT, X, exec, echo -e "No\nSí" | rofi -dmenu -p "¿Apagar sistema?" -i -theme-str 'window {width: 15%;} listview {lines: 2;}' | grep -q "Sí" && systemctl poweroff # Menú de apagado del sistema
bind = $mainMod SHIFT, B, exec, pkill waybar && waybar & disown     # Recargar panel superior (Waybar)
# bind = $mainMod SHIFT, W, exec, ~/.config/ml4w/scripts/reload-hyprpaper.sh  # Recargar fondo de pantalla (Hyprpaper) ¡¡¡NO USO HYPRPAPER!!!
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy                  # Captura de pantalla (Selección manual)
bind = SHIFT, Print, exec, grim - | wl-copy                           # Captura de pantalla (Pantalla completa)

# ==============================================================================
# CONTROLES MULTIMEDIA Y HARDWARE
# ==============================================================================
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+ # Subir volumen
bind = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%- # Bajar volumen
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle              # Silenciar altavoces
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle         # Silenciar micrófono
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+                            # Subir brillo de pantalla
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-                          # Bajar brillo de pantalla
bind = , XF86WLAN, exec, nmcli radio wifi toggle                                      # Activar/Desactivar Wi-Fi
bind = , XF86Refresh, exec, xdotool key F5                                            # Simular tecla F5 (Refrescar)

# ==============================================================================
# GESTIÓN DE VENTANAS Y FOCO
# ==============================================================================
bind = $mainMod, T, togglefloating                                    # Alternar modo flotante / mosaico
bind = $mainMod, F, fullscreen                                        # Alternar modo pantalla completa
bind = $mainMod, P, pseudo,                                           # Layout: Activar modo pseudo-mosaico
bind = $mainMod, J, togglesplit,                                      # Layout: Cambiar división de mosaico

bind = $mainMod, left, movefocus, l                                   # Mover el foco a la ventana izquierda
bind = $mainMod, right, movefocus, r                                  # Mover el foco a la ventana derecha
bind = $mainMod, up, movefocus, u                                     # Mover el foco a la ventana superior
bind = $mainMod, down, movefocus, d                                   # Mover el foco a la ventana inferior

# ==============================================================================
# ESPACIOS DE TRABAJO (WORKSPACES)
# ==============================================================================
bind = $mainMod, 1, workspace, 1                                      # Ir al espacio de trabajo 1
bind = $mainMod, 2, workspace, 2                                      # Ir al espacio de trabajo 2
bind = $mainMod, 3, workspace, 3                                      # Ir al espacio de trabajo 3
bind = $mainMod, 4, workspace, 4                                      # Ir al espacio de trabajo 4
bind = $mainMod, 5, workspace, 5                                      # Ir al espacio de trabajo 5
bind = $mainMod, 6, workspace, 6                                      # Ir al espacio de trabajo 6
bind = $mainMod, 7, workspace, 7                                      # Ir al espacio de trabajo 7
bind = $mainMod, 8, workspace, 8                                      # Ir al espacio de trabajo 8
bind = $mainMod, 9, workspace, 9                                      # Ir al espacio de trabajo 9
bind = $mainMod, 0, workspace, 10                                     # Ir al espacio de trabajo 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1                          # Mover ventana actual al espacio 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2                          # Mover ventana actual al espacio 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3                          # Mover ventana actual al espacio 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4                          # Mover ventana actual al espacio 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5                          # Mover ventana actual al espacio 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6                          # Mover ventana actual al espacio 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7                          # Mover ventana actual al espacio 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8                          # Mover ventana actual al espacio 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9                          # Mover ventana actual al espacio 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10                         # Mover ventana actual al espacio 10

# ==============================================================================
# CONTROLES DE RATÓN
# ==============================================================================
bind = $mainMod, mouse_down, workspace, e+1                           # Scroll abajo: Siguiente espacio de trabajo
bind = $mainMod, mouse_up, workspace, e-1                             # Scroll arriba: Espacio de trabajo anterior
bindm = $mainMod, mouse:272, movewindow                               # Clic Izquierdo sostenido + SUPER: Mover ventana
bindm = $mainMod, mouse:273, resizewindow                             # Clic Derecho sostenido + SUPER: Redimensionar ventana
